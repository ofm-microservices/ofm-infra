{{- range $name, $svc := .Values.services }}
{{- $ing := $svc.ingress | default dict }}
{{- if and $svc.enabled $ing.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: {{ $svc.ingress.host }}
      http:
        paths:
          - path: {{ $svc.ingress.path | default "/" }}
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: {{ (index $svc.ports 0).servicePort }}
---
{{- end }}
{{- end }}
