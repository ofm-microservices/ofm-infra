{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/component: {{ $name }}
    {{- include "ofm.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ $name }}
      {{- include "ofm.labels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ $name }}
        {{- include "ofm.labels" $ | nindent 8 }}
      annotations:
        linkerd.io/inject: enabled
        {{- if $.Values.global.linkerd.skipOutboundPorts }}
        config.linkerd.io/skip-outbound-ports: "{{ $.Values.global.linkerd.skipOutboundPorts }}"
        {{- else if $.Values.global.nats.skipLinkerdOutbound }}
        config.linkerd.io/skip-outbound-ports: "{{ $.Values.global.nats.clientPort }}"
        {{- end }}
    spec:
      terminationGracePeriodSeconds: 15
      hostAliases:
        - ip: {{ include "ofm.externalHost" $ | quote }}
          hostnames:
            - host.k3d.internal
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: {{ $name }}
          image: {{ $svc.image }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            {{- range $svc.ports }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}
          env:
            {{- include "ofm.serviceEnv" (dict "serviceName" $name "Values" $.Values "Release" $.Release) | nindent 12 }}
---
{{- end }}
{{- end }}
