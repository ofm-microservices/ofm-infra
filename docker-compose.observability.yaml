name: ofm-infra

services:
  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: ofm-prometheus
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.50"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9095:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:12.3.0
    container_name: ofm-grafana
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.50"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  grafana-bootstrap:
    image: curlimages/curl:8.12.1
    container_name: ofm-grafana-bootstrap
    restart: "no"
    depends_on:
      - grafana
      - prometheus
      - clickhouse
      - tempo
    volumes:
      - ./scripts/grafana-bootstrap.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/sh", "/bootstrap.sh"]

  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    container_name: ofm-clickhouse
    restart: unless-stopped
    mem_limit: 2g
    cpus: "2.00"
    ports:
      - "9097:8123"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./observability/clickhouse/users.xml:/etc/clickhouse-server/users.d/ofm.xml:ro
      - ./observability/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  tempo:
    image: grafana/tempo:2.10.0
    container_name: ofm-tempo
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.50"
    command:
      - "-config.file=/etc/tempo.yaml"
    ports:
      - "9096:3200"
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: ofm-otel-collector
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.50"
    command:
      - "--config=/etc/otel-collector.yaml"
    ports:
      - "9098:4317"
      - "9099:4318"
      - "9094:8888"
    volumes:
      - ./observability/otel-collector/otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      - tempo

volumes:
  prometheus_data:
    name: ofm-infra_prometheus_data
  grafana_data:
    name: ofm-infra_grafana_data
  clickhouse_data:
    name: ofm-observability_clickhouse_data
    external: true
  tempo_data:
    name: ofm-observability_tempo_data
    external: true
