services:
  nats:
    image: nats:2.12.4-alpine
    container_name: ofm-nats
    restart: unless-stopped
    command:
      - "-js"
      - "-m"
      - "8222"
      - "-sd"
      - "/data/jetstream"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data/jetstream

volumes:
  nats_data:
