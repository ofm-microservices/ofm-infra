services:
  realtime-service:
    build:
      context: ..
      dockerfile: ofm-realtime-service/Dockerfile
    container_name: ofm-realtime-service
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.00"
    environment:
      APP_NAME: realtime-service
      APP_ENV: local
      HTTP_PORT: "8082"
      JWT_ACCESS_SECRET: aa96fae1a6eee39b879dad6b6bb372e63278257bf9f94010bc7d25693f61e38c
      NATS_URL: nats://ofm-nats:4222
    ports:
      - "8082:8082"
      - "9610:9610"
    depends_on:
      - nats
