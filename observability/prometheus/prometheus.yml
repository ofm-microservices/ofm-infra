global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: tempo
    metrics_path: /metrics
    static_configs:
      - targets: ["tempo:3200"]

  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9606"]

  - job_name: registration-saga-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9600"]

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9601"]

  - job_name: user-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9602"]

  - job_name: gig-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9603"]

  - job_name: file-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9604"]

  - job_name: mail-service
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:9605"]
